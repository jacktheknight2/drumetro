<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Drumetro">
    <title>Drumetro Stage Pro</title>

    <script>
        // --- DEINE SETLIST ---
        const setlist = [
            { titel: "Highway to Hell", bpm: 116, notizen: "Intro 4 Takte" },
            { titel: "Billie Jean", bpm: 117, notizen: "Snare Fokus" },
            { titel: "Smells Like Spirit", bpm: 117, notizen: "Intro Fill-In!" },
            { titel: "Dein neuer Song", bpm: 140, notizen: "Vollgas geben!" },
            { titel: "fast fast fast", bpm: 240, notizen: "Das hier ist ein Test!" },
            { titel: "All the small things", bpm: 145, notizen: "Solo 3x4, 4.x Aufbau" },
            { titel: "Loss mi amoi no", bpm: 123, notizen: "Solo, Ende zusammenschauen" },
            { titel: "Verdammt ich lieb dich", bpm: 107, notizen: "Anfang Time! Geben" },
            { titel: "Bologna", bpm: 114, notizen: "2 2+ 4 Beat immer außer Wenn jemand" },
            { titel: "Narcotic", bpm: 93, notizen: "Time!" },
            { titel: "Westerland", bpm: 175, notizen: "1. Strophe lang, bridge nicht vergessen" },
            { titel: "Sara perche ti amo", bpm: 128, notizen: "Einstieg 2. Strophe Solo" }, 
            { titel: "Boys of Summer", bpm: 192, notizen: "Time! Solo 16T leise 16 laut, schluss Intro + Triolen" },
            { titel: "Freindschoft", bpm: 120, notizen: "Ablauf unklar, bitte selber nochmal einstudieren" },
            { titel: "najo was i ned", bpm: 209, notizen: "schnell schnell" }
        ];
    </script>

    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; touch-action: pan-y; }
        #global-settings { background: #111; padding: 15px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        #song-info { margin-bottom: 20px; padding: 0 15px; }
        h1 { font-size: 3.5em; color: white; margin: 5px 0; } 
        h2 { font-size: 2em; color: #aaa; margin: 0; }
        #notizen-haupt { font-size: 1.8em; color: #888; margin: 10px 0; min-height: 1.5em; }

        #takt-anzeige { display: flex; justify-content: center; gap: 25px; margin: 25px 0; }
        .punkt { width: 70px; height: 70px; border-radius: 50%; background: #222; transition: 0.1s; border: 3px solid #444; cursor: pointer; }
        .aktiv-1 { background: #ff0000; box-shadow: 0 0 35px #ff0000; border-color: #fff !important; }
        .aktiv-andere { background: #00ff00; box-shadow: 0 0 35px #00ff00; border-color: #fff !important; }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        button { padding: 30px; font-size: 1.3em; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        #startBtn { background: #00ff00; width: 220px; color: black; }
        .navBtn { background: #333; color: white; width: 140px; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        #next-songs { margin-top: 20px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; border-top: 2px solid #444; padding: 10px 15px; }
        #liste-vorschau { max-height: 200px; overflow-y: auto; padding-right: 10px; }
        #liste-vorschau::-webkit-scrollbar { width: 30px; }
        #liste-vorschau::-webkit-scrollbar-track { background: #222; border-radius: 10px; }
        #liste-vorschau::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; border: 4px solid #222; }
        
        .vorschau-item { padding: 15px; border-bottom: 1px solid #222; opacity: 0.7; }
        .vorschau-item.aktiv-song { background: #004400; border-left: 5px solid #00ff00; opacity: 1; }
        .vorschau-songname { font-weight: bold; font-size: 1.1em; color: #eee; }
        .vorschau-bpm { font-size: 0.9em; color: #888; }

        .slider-container { margin: 30px 0; }
        input[type=range] { -webkit-appearance: none; width: 90%; height: 25px; background: #333; border-radius: 15px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 55px; height: 55px; background: #00ff00; border-radius: 50%; border: 3px solid #fff; }
    </style>
</head>
<body>

<div id="global-settings">
    <label style="color: #888; font-size: 0.9em; margin-right: 10px;">SOUND:</label>
    <select id="sound-select" onchange="gewählterSound = this.value" 
            style="padding: 12px; border-radius: 8px; background: #222; color: #00ff00; border: 1px solid #444; font-size: 1.1em;">
        <option value="Digital" selected>Digital Click (Hart)</option>
        <option value="Wood">Woodblock (Mittel)</option>
        <option value="Beep">Klassisch (Weich)</option>
    </select>
</div>

<div id="song-info">
    <h1 id="titel">Lade Setlist...</h1>
    <h2 id="bpm-anzeige">BPM: --</h2>
    <p id="notizen-haupt">-</p>
    <div class="slider-container">
        <input type="range" id="bpm-slider" min="40" max="250" value="120" oninput="updateBpmVomSlider(this.value)">
    </div>
</div>

<div id="takt-anzeige">
    <div id="p1" class="punkt" onclick="toggleSchlag(0)"></div>
    <div id="p2" class="punkt" onclick="toggleSchlag(1)"></div>
    <div id="p3" class="punkt" onclick="toggleSchlag(2)"></div>
    <div id="p4" class="punkt" onclick="toggleSchlag(3)"></div>
</div>

<div class="btn-group">
    <button class="navBtn" onclick="zurueck()">ZURÜCK</button>
    <button id="startBtn" onclick="toggle()">START</button>
    <button class="navBtn" onclick="vor()">WEITER</button>
</div>

<div id="next-songs">
    <div id="liste-vorschau"></div>
</div>

<script>
    // Sound-Profile Definitionen
    const soundProfile = {
        "Digital": { hoch: 1800, tief: 1000, typ: 'square' },
        "Wood":    { hoch: 1200, tief: 800,  typ: 'triangle' },
        "Beep":    { hoch: 1200, tief: 800,  typ: 'sine' }
    };

    let gewählterSound = "Digital";
    let index = 0;
    let läuft = false;
    let schlag = 0;
    let timerID = null;
    let lookahead = 25.0;
    let scheduleAheadTime = 0.1;
    let nextNoteTime = 0.0;
    let schlagKonfiguration = [1, 0, 0, 0]; // 1 = betont, 0 = normal
    let wakeLock = null;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Funktion: Bildschirm wach halten
    async function aktiviereWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.log("WakeLock Fehler: " + err.message);
            }
        }
    }

    function zeigeSong() {
        const song = setlist[index];
        document.getElementById('titel').innerText = song.titel;
        document.getElementById('bpm-anzeige').innerText = "BPM: " + song.bpm;
        document.getElementById('notizen-haupt').innerText = song.notizen;
        document.getElementById('bpm-slider').value = song.bpm;

        let vorschauHTML = "";
        setlist.forEach((s, i) => {
            const istAktiv = (i === index) ? "aktiv-song" : "";
            vorschauHTML += `
                <div class="vorschau-item ${istAktiv}" onclick="waehleSong(${i})">
                    <span class="vorschau-songname">${i + 1}. ${s.titel}</span> 
                    <span class="vorschau-bpm">(${s.bpm} BPM)</span>
                </div>`;
        });
        document.getElementById('liste-vorschau').innerHTML = vorschauHTML;
        if (läuft) nextNoteTime = audioCtx.currentTime;
        updateVisuals(-1); // Nur Rahmen-Update
    }

    function waehleSong(neuerIndex) {
        index = neuerIndex;
        zeigeSong();
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
            scheduleNote(schlag, nextNoteTime);
            advanceNote();
        }
    }

    function advanceNote() {
        const secondsPerBeat = 60.0 / setlist[index].bpm;
        nextNoteTime += secondsPerBeat;
        schlag = (schlag + 1) % 4;
    }

    function scheduleNote(beatNumber, time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const config = soundProfile[gewählterSound];

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = config.typ;
        const istBetont = schlagKonfiguration[beatNumber] === 1;
        osc.frequency.value = istBetont ? config.hoch : config.tief;

        gain.gain.setValueAtTime(0.25, time);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.04);
        
        osc.start(time);
        osc.stop(time + 0.04);

        setTimeout(() => {
            updateVisuals(beatNumber + 1);
        }, (time - audioCtx.currentTime) * 1000);
    }

    function updateVisuals(beat) {
        document.querySelectorAll('.punkt').forEach((p, i) => {
            p.classList.remove('aktiv-1', 'aktiv-andere');
            // Betonte Schläge haben einen hellen Rahmen als Markierung
            p.style.borderColor = schlagKonfiguration[i] === 1 ? "#aaa" : "#444";
            p.style.borderWidth = schlagKonfiguration[i] === 1 ? "5px" : "3px";
        });

        if (beat > 0) {
            const aktuellerPunkt = document.getElementById('p' + beat);
            if (aktuellerPunkt) {
                if (schlagKonfiguration[beat - 1] === 1) {
                    aktuellerPunkt.classList.add('aktiv-1');
                } else {
                    aktuellerPunkt.classList.add('aktiv-andere');
                }
            }
        }
    }

    function toggle() {
        if (läuft) {
            clearInterval(timerID);
            läuft = false;
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
            document.getElementById('startBtn').innerText = "START";
            document.getElementById('startBtn').style.background = "#00ff00";
            updateVisuals(-1);
        } else {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            aktiviereWakeLock();
            schlag = 0;
            nextNoteTime = audioCtx.currentTime + 0.05;
            timerID = setInterval(scheduler, lookahead);
            läuft = true;
            document.getElementById('startBtn').innerText = "STOPP";
            document.getElementById('startBtn').style.background = "#ff4400";
        }
    }

    function toggleSchlag(nr) {
        schlagKonfiguration[nr] = schlagKonfiguration[nr] === 1 ? 0 : 1;
        updateVisuals(-1); 
    }

    function vor() { if (index < setlist.length - 1) { index++; zeigeSong(); } }
    function zurueck() { if (index > 0) { index--; zeigeSong(); } }
    function updateBpmVomSlider(neuerWert) {
        setlist[index].bpm = parseInt(neuerWert);
        document.getElementById('bpm-anzeige').innerText = "BPM: " + neuerWert;
    }

    zeigeSong();
</script>
</body>
</html>
